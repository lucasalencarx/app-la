<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>Painel da Vida</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    background: white;
    padding: 40px;
    border-radius: 16px;
    width: 320px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  }

  h2 {
    text-align: center;
    margin-bottom: 24px;
  }

  .field {
    position: relative;
    margin-bottom: 20px;
  }

  .field input {
    width: 100%;
    padding: 12px 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
    font-size: 16px;
  }

  .field label {
    position: absolute;
    left: 10px;
    top: 50%;
    color: #888;
    transform: translateY(-50%);
    background: white;
    padding: 0 5px;
    transition: 0.2s;
    pointer-events: none;
  }

  .field input:focus + label,
  .field input:not(:placeholder-shown) + label {
    top: -6px;
    font-size: 12px;
    color: #f0a500;
  }

  .toggle {
    font-size: 12px;
    cursor: pointer;
    text-align: right;
    color: #666;
    margin-bottom: 20px;
  }

  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    color: white;
    cursor: pointer;
    background: linear-gradient(45deg, #f0a500, #ffcc00);
  }
</style>
</head>
<body>

<div class="card">
  <h2>Entrar</h2>

  <div class="field">
    <input type="email" id="email" placeholder=" " />
    <label>Email</label>
  </div>

  <div class="field">
    <input type="password" id="senha" placeholder=" " />
    <label>Senha</label>
  </div>

  <div class="toggle" onclick="toggleSenha()">👁 Mostrar / Esconder senha</div>

  <button onclick="login()">Entrar</button>
</div>

<script>
function toggleSenha() {
  const input = document.getElementById("senha");
  input.type = input.type === "password" ? "text" : "password";
}

function login() {
  // Simples: redireciona pro dashboard
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
