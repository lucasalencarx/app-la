<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />

<!-- ESSENCIAL pra não dar zoom no mobile -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />

<title>Lucas Alencar - Administração Pessoal</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 20px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    animation: fadeIn 0.6s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }

  .logo img {
    width: 85px;
    height: 85px;
    object-fit: contain;
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #111;
  }

  .field {
    position: relative;
    margin-bottom: 18px;
  }

  .field input {
    width: 100%;
    padding: 14px 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    outline: none;
    font-size: 16px; /* evita zoom */
    transition: 0.2s;
  }

  .field input:focus {
    border-color: #f59e0b;
    box-shadow: 0 0 0 3px rgba(245,158,11,0.2);
  }

  .field label {
    position: absolute;
    left: 12px;
    top: 50%;
    color: #777;
    transform: translateY(-50%);
    background: white;
    padding: 0 6px;
    transition: 0.2s;
    pointer-events: none;
  }

  .field input:focus + label,
  .field input:not(:placeholder-shown) + label {
    top: -8px;
    font-size: 12px;
    color: #f59e0b;
  }

  .toggle {
    font-size: 13px;
    cursor: pointer;
    text-align: right;
    color: #555;
    margin-bottom: 20px;
  }

  .toggle:hover {
    color: #000;
  }

  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    color: white;
    cursor: pointer;
    background: linear-gradient(45deg, #050505, #292928);
    font-weight: bold;
    transition: 0.2s;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  }

  button:active {
    transform: scale(0.97);
  }

  /* MOBILE */
  @media (max-width: 400px) {
    .card {
      margin: 20px;
      padding: 25px;
    }
  }
</style>
</head>

<body>

<div class="card">

  <!-- LOGO -->
  <div class="logo">
    <img src="logomarca.png" alt="Logo">
  </div>

  <h2>Entrar</h2>

  <div class="field">
    <input type="email" id="email" placeholder=" " />
    <label>Email</label>
  </div>

  <div class="field">
    <input type="password" id="senha" placeholder=" " />
    <label>Senha</label>
  </div>

  <div class="toggle" onclick="toggleSenha()">👁 Mostrar senha</div>

  <button onclick="login()">Entrar</button>

</div>

<script>
function toggleSenha() {
  const input = document.getElementById("senha");
  input.type = input.type === "password" ? "text" : "password";
}

function login() {
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
